name: Daily NASDAQ System Runner

on:
  schedule:
    # UTC 기준 22시 30분 = 한국 시간(KST) 매일 아침 7시 30분 (미국 장 마감 후)
    - cron: '30 22 * * *'
  workflow_dispatch: # 수동으로 버튼을 눌러 즉시 실행해볼 수 있는 옵션!

permissions:
  contents: write # 깃허브 페이지 업로드를 위한 쓰기 권한

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests urllib3

      - name: 4. 나스닥 시스템 스크립트 실행 (텔레그램 알림 발송!)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python run_nasdaq_system.py

      - name: 5. 새로 만든 대시보드 HTML 깃허브에 반영 (웹사이트 자동 갱신)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add nasdaq_dashboard.html
          git commit -m "🤖 [Auto] 나스닥 일일 대시보드 업데이트 ($(date +'%Y-%m-%d'))" || echo "변경된 내용이 없습니다."
          git push
